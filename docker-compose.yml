services:
  app:
    image: mauriceboe/trek:custom
    container_name: trek
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-} # Recommended. Generate with: openssl rand -hex 32. If unset, falls back to data/.jwt_secret (existing installs) or auto-generates a key (fresh installs).
      - TZ=${TZ:-UTC} # Timezone for logs, reminders and scheduled tasks (e.g. Europe/Berlin)
      - LOG_LEVEL=${LOG_LEVEL:-info} # info = concise user actions; debug = verbose admin-level details
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000} # Comma-separated origins for CORS and email notification links
      - FORCE_HTTPS=${FORCE_HTTPS:-false} # Redirect HTTP to HTTPS when behind a TLS-terminating proxy
      - COOKIE_SECURE=${COOKIE_SECURE:-false} # Set to true when serving behind HTTPS so auth cookies are marked Secure
      - ALLOW_INTERNAL_NETWORK=${ALLOW_INTERNAL_NETWORK:-false} # Set to true if Immich or other services are hosted on your local network (RFC-1918 IPs). Loopback and link-local addresses remain blocked regardless.
      - APP_URL=${APP_URL:-http://localhost:3000} # Public base URL — required when OIDC is enabled (must match the redirect URI registered with your IdP); also used as base URL for links in email notifications
      - LOCAL_AUTH_BYPASS=${LOCAL_AUTH_BYPASS:-false} # Local-only shortcut: treat requests as an authenticated admin without login
      - AI_ASSISTANT_LOCAL_BASE_URL=${AI_ASSISTANT_LOCAL_BASE_URL:-http://127.0.0.1:1234/v1} # OpenAI-compatible local model base URL (LM Studio, etc.)
      - AI_ASSISTANT_LOCAL_MODEL=${AI_ASSISTANT_LOCAL_MODEL:-} # Model id exposed by the local LLM server
#      - AI_ASSISTANT_LOCAL_API_KEY= # Optional API key if your local server requires one
#      - OIDC_ISSUER=https://auth.example.com # OpenID Connect provider URL
#      - OIDC_CLIENT_ID=trek # OpenID Connect client ID
#      - OIDC_CLIENT_SECRET=supersecret # OpenID Connect client secret
#      - OIDC_DISPLAY_NAME=SSO # Label shown on the SSO login button
#      - OIDC_ONLY=false # Set true to disable local password auth entirely (SSO only)
#      - OIDC_ADMIN_CLAIM=groups # OIDC claim used to identify admin users
#      - OIDC_ADMIN_VALUE=app-trek-admins # Value of the OIDC claim that grants admin role
#      - OIDC_SCOPE=openid email profile # Fully overrides the default. Add extra scopes as needed (e.g. add groups if using OIDC_ADMIN_CLAIM)
#      - OIDC_DISCOVERY_URL= # Override the OIDC discovery endpoint for providers with non-standard paths (e.g. Authentik)
#      - ADMIN_EMAIL=admin@trek.local # Initial admin e-mail — only used on first boot when no users exist
#      - ADMIN_PASSWORD=changeme      # Initial admin password — only used on first boot when no users exist
#      - MCP_RATE_LIMIT=60 # Max MCP API requests per user per minute (default: 60)
#      - MCP_MAX_SESSION_PER_USER=5 # Max concurrent MCP sessions per user (default: 5)
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
